services:
  - type: web
    name: glondia-analysts-consultancy
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATA_DIR
        value: /var/data
    disk:
      name: glondia-data
      mountPath: /var/data
      sizeGB: 1
